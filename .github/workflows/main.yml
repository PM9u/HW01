name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때 트리거 됨

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}  # GitHub Secrets에 저장 필요
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}  # GitHub Secrets에 저장 필요
  IMAGE_NAME: spam-classifier-api

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          # 빌드 시간 단축을 위한 캐싱 지원
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to Self-Hosted Runner
    needs: build-and-push
    # Self-hosted runner 라벨 (사용자 환경의 runner 설정 시 등록된 라벨과 동일해야 함)
    runs-on: self-hosted
    steps:
      - name: Pull Latest Image
        run: docker pull ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Stop and Remove Old Container
        # 이미지가 없거나 컨테이너가 없을 때 오류가 발생하지 않도록 || true 사용
        run: |
          docker stop ${{ env.IMAGE_NAME }} || true
          docker rm ${{ env.IMAGE_NAME }} || true

      - name: Run New Container
        run: |
          docker run -d \
            --name ${{ env.IMAGE_NAME }} \
            -p 8000:8000 \
            --restart unless-stopped \
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
